<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Login Section -->
    <div class="container mt-5" id="loginSection">
        <div class="card login-card shadow">
            <div class="card-body">
                <h2 class="text-center mb-4">Employee Portal Login</h2>

                <input type="email" id="loginEmail" class="form-control mb-3" placeholder="Enter Email">

                <input type="password" id="loginPassword" class="form-control mb-3" placeholder="Enter Password">

                <button class="btn btn-primary w-100" onclick="login()">
                    Login
                </button>

                <p id="loginMessage" class="mt-3 text-center"></p>
            </div>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="container mt-4 d-none" id="dashboard">

        <h1 class="text-center text-primary mb-4">
            Employee Management System
        </h1>

        <div class="counter-box">
            Total Employees:
            <span id="employeeCount">0</span>
        </div>

        <div class="card shadow p-4 mb-4">

            <h4>Add / Edit Employee</h4>

            <input type="hidden" id="editIndex">

            <div class="row">

                <div class="col-md-3">
                    <input type="text" id="name" class="form-control" placeholder="Employee Name">
                </div>

                <div class="col-md-3">
                    <input type="text" id="role" class="form-control" placeholder="Role">
                </div>

                <div class="col-md-2">
                    <input type="number" id="salary" class="form-control" placeholder="Salary">
                </div>

                <div class="col-md-4">
                    <input type="email" id="email" class="form-control" placeholder="Email">
                </div>

            </div>

            <button class="btn btn-success mt-3" onclick="saveEmployee()">
                Save Employee
            </button>

        </div>

        <input
            type="text"
            id="search"
            class="form-control mb-3"
            placeholder="Search Employee..."
            onkeyup="displayEmployees()"
        >

        <div class="table-responsive">

            <table class="table table-bordered table-hover">

                <thead class="table-primary">

                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Role</th>
                        <th>Salary</th>
                        <th>Email</th>
                        <th>Actions</th>
                    </tr>

                </thead>

                <tbody id="employeeTable"></tbody>

            </table>

        </div>

    </div>

<script src="script.js"></script>

</body>
</html>
